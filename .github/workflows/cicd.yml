name: blazar Build and Push to ECR (OIDC)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          components: clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Install musl tooling
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: cargo fmt --check
        run: cargo fmt --all -- --check || true

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings || true

      - name: cargo test
        run: cargo test --all

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: blazar-master
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configure AWS credentials using OIDC - no access keys needed!
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Image digest
        run: echo "Image pushed with tag ${{ github.sha }}"

      # Prepare docker-compose.yml for deployment to S3
      - name: Generate docker-compose.yml from template
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Substitute __ECR_IMAGE__ placeholder with actual image URI
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          sed "s|__ECR_IMAGE__|${ECR_IMAGE}|g" docker-compose.template.yml > docker-compose.yml
          echo "Generated docker-compose.yml:"
          cat docker-compose.yml

      # Upload docker-compose.yml to S3 artifact bucket
      - name: Upload docker-compose.yml to S3
        env:
          S3_BUCKET: ${{ secrets.ARTIFACT_BUCKET_NAME }}
          S3_PATH: ${{ secrets.ARTIFACT_S3_KEY }}
        run: |
          aws s3 cp docker-compose.yml s3://${S3_BUCKET}/${S3_PATH}
          echo "Uploaded docker-compose.yml to s3://${S3_BUCKET}/${S3_PATH}"
